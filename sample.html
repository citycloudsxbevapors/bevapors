<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Bevapors X City Clouds | Loyalty Card Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --primary: #8a2be2;
            --primary-dark: #6a0dad;
            --text-strong: #ffffff;
            --text-muted: #e9e9f3;
            --overlay-90: rgba(8, 10, 22, 0.90);
            --overlay-75: rgba(8, 10, 22, 0.75);
            --card: rgba(10, 12, 20, 0.72);
            --line: rgba(255, 255, 255, 0.12);
            --error-bg: rgba(220, 53, 69, 0.25);
            --success-bg: rgba(40, 167, 69, 0.25);
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        body {
            color: var(--text-strong);
            background-image: linear-gradient(180deg, rgba(6,8,18,0.55), rgba(6,8,18,0.55)), url("images/bg.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.35);
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            overflow: hidden;
        }

        .app-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            overflow: hidden;
        }

        header {
            background: var(--overlay-90);
            backdrop-filter: blur(6px);
            border-bottom: 1px solid var(--line);
            width: 100%;
            flex-shrink: 0;
        }

        .header-container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 12px 30px;
        }

        @media (max-width: 768px) {
            .header-container { padding: 12px 20px; }
        }
        @media (max-width: 480px) {
            .header-container { padding: 10px 16px; }
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 26px;
            font-weight: 700;
            color: var(--text-strong);
            text-decoration: none;
            display: flex;
            align-items: center;
        }

        .logo span {
            color: var(--primary);
        }

        nav ul {
            display: flex;
            list-style: none;
        }
        nav ul li {
            margin-left: 26px;
        }
        nav ul li a {
            color: var(--text-strong);
            text-decoration: none;
            font-weight: 600;
            position: relative;
            padding-bottom: 4px;
        }
        nav ul li a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            height: 2px;
            width: 0;
            background: linear-gradient(90deg, var(--primary), #b07cff);
            transition: width 0.25s ease;
        }
        nav ul li a:hover::after {
            width: 100%;
        }
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            color: var(--text-strong);
            font-size: 24px;
            cursor: pointer;
        }

        .search-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            overflow-y: auto;
            position: relative;
        }

        .search-section::-webkit-scrollbar {
            width: 4px;
            background: transparent;
        }
        .search-section::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.3);
            border-radius: 20px;
        }

        .card-search-box {
            background: var(--card);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 2rem 2.2rem;
            width: 90%;
            max-width: 560px;
            margin: 20px auto;
            text-align: center;
            border: 1px solid rgba(138, 43, 226, 0.5);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4);
            transition: transform 0.2s ease;
        }

        .card-search-box h2 {
            font-size: 1.9rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #ffffff, #d9c8ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .card-search-box p {
            color: var(--text-muted);
            margin-bottom: 28px;
            font-size: 0.95rem;
        }

        .input-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 18px;
        }

        .card-input {
            flex: 2;
            min-width: 180px;
            padding: 14px 20px;
            border-radius: 60px;
            border: none;
            outline: none;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            color: white;
            font-weight: 500;
            text-align: center;
            letter-spacing: 1px;
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.25);
        }

        .card-input:focus {
            background: rgba(255,255,255,0.3);
            border-color: var(--primary);
            box-shadow: 0 0 12px rgba(138, 43, 226, 0.5);
        }

        .card-input::placeholder {
            color: rgba(255,255,240,0.7);
            font-weight: 400;
        }

        .search-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            padding: 0 30px;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.3);
        }

        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 22px rgba(138, 43, 226, 0.5);
        }

        .message-area {
            margin-top: 20px;
            min-height: 80px;
        }

        .error-message {
            background: var(--error-bg);
            border-left: 4px solid #ff6b6b;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 0.85rem;
            color: #ffe0e0;
            text-align: left;
        }

        .error-message i {
            margin-right: 8px;
        }

        .success-message {
            background: var(--success-bg);
            border-left: 4px solid #28a745;
            padding: 10px 16px;
            border-radius: 36px;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: #d4ffd4;
        }

        .info-hint {
            font-size: 0.8rem;
            margin-top: 18px;
            opacity: 0.75;
            background: rgba(0,0,0,0.3);
            display: inline-block;
            padding: 6px 18px;
            border-radius: 60px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
        .cloud {
            position: absolute;
            opacity: 0.26;
            z-index: 1;
            color: #ffffff;
            filter: drop-shadow(0 6px 14px rgba(0, 0, 0, 0.25));
            animation: float 14s infinite ease-in-out;
            pointer-events: none;
        }
        .cloud:nth-child(1) { top: 12%; left: 4%; font-size: 100px; }
        .cloud:nth-child(2) { top: 22%; right: 5%; font-size: 120px; animation-delay: 1.8s; }
        .cloud:nth-child(3) { bottom: 15%; left: 6%; font-size: 90px; animation-delay: 3s; }
        .cloud:nth-child(4) { bottom: 20%; right: 8%; font-size: 110px; animation-delay: 4.5s; }

        footer {
            background: var(--overlay-75);
            backdrop-filter: blur(5px);
            border-top: 1px solid var(--line);
            width: 100%;
            flex-shrink: 0;
        }
        .footer-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 14px 30px;
        }
        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .copyright {
            opacity: 0.92;
            font-size: 0.9rem;
        }
        .social-links {
            display: flex;
            gap: 12px;
        }
        .social-links a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            background: rgba(255, 255, 255, 0.14);
            border: 1px solid var(--line);
            color: #fff;
            border-radius: 50%;
            transition: transform 0.2s;
        }
        .social-links a:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #d7c0ff, #9b79ff);
        }

        @media (max-width: 768px) {
            .card-search-box { padding: 1.5rem; }
            .card-search-box h2 { font-size: 1.5rem; }
            .search-btn { padding: 0 22px; }
            .mobile-menu-btn { display: block; }
            nav {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background: var(--overlay-90);
                padding: 18px 0;
                border-bottom: 1px solid var(--line);
                z-index: 1001;
            }
            nav.active { display: block; }
            nav ul { flex-direction: column; align-items: center; }
            nav ul li { margin: 10px 0; }
            .logo { font-size: 22px; }
        }

        @media (max-width: 480px) {
            .card-search-box { width: 95%; padding: 1.2rem; }
            .input-group { flex-direction: column; }
            .search-btn { padding: 12px; justify-content: center; }
            .cloud { display: none; }
        }

        .highlight {
            background: rgba(138, 43, 226, 0.3);
            padding: 2px 6px;
            border-radius: 8px;
            font-family: monospace;
        }
    </style>
</head>
<body>
<div class="app-wrapper">
    <header>
        <div class="header-container">
            <div class="header-content">
                <a href="index.html" class="logo">
                    City Clouds <span>X</span> Bevapors
                </a>
                <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Menu">
                    <i class="fas fa-bars"></i>
                </button>
                <nav id="mainNav">
                    <ul>
                        <li><a href="index.html">Home</a></li>
                        <li><a href="mechanics.html">Mechanics</a></li>
                        <li><a href="card.html">Loyalty Card</a></li>
                        <li><a href="#">Contact</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <section class="search-section">
        <div class="cloud"><i class="fas fa-cloud"></i></div>
        <div class="cloud"><i class="fas fa-cloud"></i></div>
        <div class="cloud"><i class="fas fa-cloud"></i></div>
        <div class="cloud"><i class="fas fa-cloud"></i></div>

        <div class="card-search-box">
            <h2><i class="fas fa-id-card"></i>  Loyalty Card Access</h2>
            <p>Enter your unique card number to view your exclusive rewards & points</p>
            
            <div class="input-group">
                <input type="text" id="cardNumberInput" class="card-input" placeholder="e.g., 001, 002, 003" autocomplete="off">
                <button id="searchCardBtn" class="search-btn"><i class="fas fa-search"></i> Check Card</button>
            </div>
            <div class="message-area" id="messageArea"></div>
            <div class="info-hint">
                <i class="fas fa-info-circle"></i> Demo cards: 001, 002, 003, 004
            </div>
        </div>
    </section>

    <footer>
        <div class="footer-container">
            <div class="footer-content">
                <div class="copyright">
                    <p>&copy; 2022 City Clouds X Bevapors. All rights reserved. For adults 18+ only.</p>
                </div>
                <div class="social-links">
                    <a target="_blank" href="https://www.facebook.com/citycloudsxbevapors" rel="noopener noreferrer"><i class="fab fa-facebook-f"></i></a>
                </div>
            </div>
        </div>
    </footer>
</div>

<script>
    (function() {
        // Mobile menu logic
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const mainNav = document.getElementById('mainNav');
        if (mobileMenuBtn && mainNav) {
            mobileMenuBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                mainNav.classList.toggle('active');
                const icon = mobileMenuBtn.querySelector('i');
                if (mainNav.classList.contains('active')) {
                    icon.className = 'fas fa-times';
                } else {
                    icon.className = 'fas fa-bars';
                }
            });
            const navLinks = document.querySelectorAll('#mainNav a');
            navLinks.forEach(link => {
                link.addEventListener('click', () => {
                    if (mainNav.classList.contains('active')) {
                        mainNav.classList.remove('active');
                        const icon = mobileMenuBtn.querySelector('i');
                        if (icon) icon.className = 'fas fa-bars';
                    }
                });
            });
            document.addEventListener('click', function(event) {
                if (!mainNav.contains(event.target) && !mobileMenuBtn.contains(event.target) && mainNav.classList.contains('active')) {
                    mainNav.classList.remove('active');
                    const icon = mobileMenuBtn.querySelector('i');
                    if (icon) icon.className = 'fas fa-bars';
                }
            });
        }

        const searchBtn = document.getElementById('searchCardBtn');
        const cardInput = document.getElementById('cardNumberInput');
        const messageArea = document.getElementById('messageArea');
        
        function clearMessage() {
            if (messageArea) messageArea.innerHTML = '';
        }
        
        function showError(text) {
            if (messageArea) {
                messageArea.innerHTML = `<div class="error-message"><i class="fas fa-exclamation-triangle"></i> ${text}</div>`;
            }
        }
        
        function showLoading(text) {
            if (messageArea) {
                messageArea.innerHTML = `<div class="error-message" style="background: rgba(138,43,226,0.3); border-left-color: #8a2be2;"><i class="fas fa-spinner fa-pulse"></i> ${text}</div>`;
            }
        }
        
        async function redirectToCardPage(cardNumber) {
            if (!cardNumber || cardNumber.trim() === "") {
                showError("❄️ Please enter a valid loyalty card number.");
                return false;
            }
            
            const safeCard = cardNumber.trim();
            const safeRegex = /^[a-zA-Z0-9_-]+$/;
            if (!safeRegex.test(safeCard)) {
                showError("Card number can only contain letters, numbers, underscores or hyphens.");
                return false;
            }
            
            showLoading(`🔍 Looking for card #${safeCard}...`);
            
            // DIRECT PATH: Since customers folder is in the same directory as card.html
            // Your structure: /Website/card.html and /Website/customers/001.html
            const directPath = `customers/${safeCard}.html`;
            
            try {
                console.log(`Attempting to load: ${directPath}`);
                
                // Try to fetch the file
                const response = await fetch(directPath, { 
                    method: 'GET',
                    cache: 'no-cache'
                });
                
                if (response.ok) {
                    // File exists! Redirect immediately
                    console.log(`✅ SUCCESS! Found card at: ${directPath}`);
                    window.location.href = directPath;
                    return true;
                } else {
                    // File not found - show helpful error
                    console.log(`❌ File not found: ${directPath} (Status: ${response.status})`);
                    
                    // Check if customers folder exists by trying to fetch a known file
                    let folderExists = false;
                    try {
                        const testResponse = await fetch('customers/001.html', { method: 'HEAD' });
                        folderExists = testResponse.ok;
                    } catch(e) {
                        folderExists = false;
                    }
                    
                    let errorHtml = `✨ Card #${safeCard} not found.<br><br>`;
                    errorHtml += `<strong>📁 Looking for file:</strong><br>`;
                    errorHtml += `<span class="highlight">${directPath}</span><br><br>`;
                    
                    if (!folderExists) {
                        errorHtml += `<strong>⚠️ IMPORTANT:</strong> The "customers" folder doesn't exist or is empty.<br><br>`;
                        errorHtml += `<strong>✅ Fix this:</strong><br>`;
                        errorHtml += `1. Create a folder named <span class="highlight">customers</span><br>`;
                        errorHtml += `2. Inside it, create <span class="highlight">${safeCard}.html</span><br>`;
                        errorHtml += `3. Make sure both are in the SAME folder as this page (card.html)<br><br>`;
                    } else {
                        errorHtml += `<strong>📂 Folder "customers" exists, but ${safeCard}.html is missing.</strong><br><br>`;
                        errorHtml += `<strong>✅ To fix:</strong> Create <span class="highlight">${safeCard}.html</span> inside the "customers" folder.<br><br>`;
                    }
                    
                    errorHtml += `<strong>📍 Current page location:</strong><br>`;
                    errorHtml += `<span class="highlight">${window.location.href}</span>`;
                    
                    showError(errorHtml);
                    return false;
                }
            } catch (err) {
                console.error(`Fetch error:`, err);
                showError(`❌ Cannot access the customers folder.<br><br>
                <strong>📁 Expected structure:</strong><br>
                Website/<br>
                ├── card.html  <-- THIS PAGE<br>
                ├── customers/<br>
                │   ├── 001.html<br>
                │   ├── 002.html<br>
                │   └── ...<br>
                ├── index.html<br>
                └── ...<br><br>
                <strong>🔧 Please create the "customers" folder and add your HTML files there.</strong>`);
                return false;
            }
        }
        
        async function onSearchCard() {
            clearMessage();
            let rawNumber = cardInput.value;
            if (!rawNumber) {
                showError("🔍 Please type your loyalty card number first.");
                cardInput.focus();
                return;
            }
            await redirectToCardPage(rawNumber);
        }
        
        if (searchBtn) {
            searchBtn.addEventListener('click', onSearchCard);
        }
        
        if (cardInput) {
            cardInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    onSearchCard();
                }
            });
            cardInput.focus();
        }
        
        // Display folder structure info in console
        console.log('='.repeat(50));
        console.log('LOYALTY CARD SYSTEM READY');
        console.log('='.repeat(50));
        console.log('📁 Required folder structure:');
        console.log('   ' + window.location.href.replace('card.html', ''));
        console.log('   ├── card.html (this file)');
        console.log('   ├── customers/');
        console.log('   │   ├── 001.html');
        console.log('   │   ├── 002.html');
        console.log('   │   └── ...');
        console.log('='.repeat(50));
    })();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Check My Points | CityClouds X Bevapors</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --primary: #8a2be2;
            --primary-dark: #6a0dad;
            --text-strong: #ffffff;
            --text-muted: #e9e9f3;
            --overlay-90: rgba(8, 10, 22, 0.90);
            --overlay-75: rgba(8, 10, 22, 0.75);
            --line: rgba(255, 255, 255, 0.12);
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        body {
            color: var(--text-strong);
            background-image: linear-gradient(180deg, rgba(6,8,18,0.55), rgba(6,8,18,0.55)), url("images/bg.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-color: #0d0f1e;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.35);
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            overflow: hidden;
        }

        .app-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            overflow: hidden;
        }

        /* ===== HEADER ===== */
        header {
            background: var(--overlay-90);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border-bottom: 1px solid var(--line);
            width: 100%;
            flex-shrink: 0;
        }

        .header-container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 12px 30px;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 26px;
            font-weight: 700;
            color: var(--text-strong);
            text-decoration: none;
            display: flex;
            align-items: center;
            letter-spacing: 0.3px;
        }

        .logo span {
            color: var(--primary);
        }

        nav ul {
            display: flex;
            list-style: none;
        }

        nav ul li {
            margin-left: 26px;
        }

        nav ul li a {
            color: var(--text-strong);
            text-decoration: none;
            font-weight: 600;
            position: relative;
            padding-bottom: 4px;
        }

        nav ul li a:hover {
            color: #f8f6ff;
        }

        nav ul li a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            height: 2px;
            width: 0;
            background: linear-gradient(90deg, var(--primary), #b07cff);
            transition: width 0.25s ease;
        }

        nav ul li a:hover::after {
            width: 100%;
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            color: var(--text-strong);
            font-size: 24px;
            cursor: pointer;
        }

        /* ===== HERO ===== */
        .hero {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            min-height: 0;
            overflow-y: auto;
        }

        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(70% 60% at 50% 45%, transparent 0%, transparent 55%, rgba(6, 8, 18, 0.35) 100%);
            pointer-events: none;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        .cloud {
            position: absolute;
            opacity: 0.32;
            z-index: 1;
            color: #ffffff;
            filter: drop-shadow(0 6px 14px rgba(0, 0, 0, 0.25));
            animation: float 14s infinite ease-in-out;
            pointer-events: none;
        }

        .cloud:nth-child(1) { top: 12%; left: 4%; font-size: 100px; animation-delay: 0s; }
        .cloud:nth-child(2) { top: 24%; right: 6%; font-size: 130px; animation-delay: 1.5s; }
        .cloud:nth-child(3) { bottom: 18%; left: 8%; font-size: 110px; animation-delay: 3s; }
        .cloud:nth-child(4) { bottom: 12%; right: 5%; font-size: 95px; animation-delay: 5s; }

        /* ===== SEARCH CARD ===== */
        .search-container {
            position: relative;
            z-index: 2;
            max-width: 640px;
            width: 100%;
            background: rgba(8, 10, 22, 0.78);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 28px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            padding: 2.2rem 2.4rem 2.6rem;
            text-align: center;
            border: 1px solid var(--line);
            margin: 20px;
        }

        .search-container h1 {
            font-size: clamp(1.8rem, 3.5vw, 2.4rem);
            font-weight: 800;
            color: #fff;
            margin-bottom: 0.5rem;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.45);
        }

        .search-container h1 span {
            color: #d7c0ff;
            text-shadow: 0 1px 10px rgba(138, 43, 226, 0.45);
        }

        .sub {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-weight: 500;
            font-size: 0.95rem;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.2);
            display: inline-block;
            padding-bottom: 0.3rem;
        }

        .search-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
            justify-content: center;
            margin: 1.5rem 0 0.8rem;
        }

        .search-input-group {
            flex: 3;
            min-width: 200px;
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.25rem;
            color: var(--text-muted);
            pointer-events: none;
        }

        #customerId {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            font-size: 1.1rem;
            font-weight: 500;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 60px;
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            font-family: monospace;
            letter-spacing: 0.5px;
            outline: none;
            transition: 0.2s;
        }

        #customerId:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(138, 43, 226, 0.25);
        }

        #customerId::placeholder {
            font-family: 'Segoe UI', system-ui;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: normal;
        }

        .search-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 1rem 2rem;
            border-radius: 60px;
            color: white;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 10px 28px rgba(138, 43, 226, 0.35);
        }

        .search-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 34px rgba(138, 43, 226, 0.5);
        }

        .search-btn:active {
            transform: scale(0.96);
        }

        .error-message {
            margin-top: 1rem;
            background: rgba(185, 28, 28, 0.3);
            color: #fca5a5;
            padding: 0.7rem;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 500;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 1px solid rgba(252, 165, 165, 0.3);
        }

        .error-message.show {
            display: flex;
        }

        /* ===== FOOTER ===== */
        footer {
            background: var(--overlay-75);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border-top: 1px solid var(--line);
            width: 100%;
            flex-shrink: 0;
        }

        .footer-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 14px 30px;
        }

        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .copyright {
            color: #ffffff;
            opacity: 0.92;
            font-size: 0.9rem;
        }

        .social-links {
            display: flex;
            gap: 12px;
        }

        .social-links a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            background: rgba(255, 255, 255, 0.14);
            border: 1px solid var(--line);
            color: #fff;
            text-decoration: none;
            border-radius: 50%;
            transition: transform 0.2s ease, background 0.2s ease;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.2);
        }

        .social-links a:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #d7c0ff, #9b79ff);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .header-container { padding: 12px 20px; }
            nav {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background: var(--overlay-90);
                padding: 18px 0;
                border-bottom: 1px solid var(--line);
                z-index: 1001;
            }
            nav.active { display: block; }
            nav ul { flex-direction: column; align-items: center; }
            nav ul li { margin: 10px 0; }
            .mobile-menu-btn { display: block; }
            .search-container { padding: 1.6rem 1.4rem; }
            .footer-container { padding: 12px 20px; }
        }

        @media (max-width: 480px) {
            .footer-content { flex-direction: column; text-align: center; gap: 8px; }
            .cloud { display: none; }
            .search-container { padding: 1.4rem 1.2rem; border-radius: 20px; }
        }

        @media (max-height: 620px) {
            .search-container { padding: 1.4rem 2rem; }
            .cloud { opacity: 0.15; }
        }
    </style>
</head>
<body>
<div class="app-wrapper">

    <!-- HEADER -->
    <header>
        <div class="header-container">
            <div class="header-content">
                <a href="index.html" class="logo">
                    CityClouds <span>X</span> Bevapors
                </a>
                <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Menu">
                    <i class="fas fa-bars"></i>
                </button>
                <nav id="mainNav">
                    <ul style="justify-content: center;">
                        <li><a href="index.html">Home</a></li>
                        <li><a href="mechanics.html">Mechanics</a></li>
                        <li><a href="#">Contact</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <!-- HERO / SEARCH -->
    <section class="hero">
        <div class="cloud"><i class="fas fa-cloud"></i></div>
        <div class="cloud"><i class="fas fa-cloud"></i></div>
        <div class="cloud"><i class="fas fa-cloud"></i></div>
        <div class="cloud"><i class="fas fa-cloud"></i></div>

        <div class="search-container">
            <h1>Check Your <span>Points</span></h1>
            <div class="sub">Enter your card number to check</div>

            <div class="search-wrapper">
                <div class="search-input-group">
                    
                    <input type="text" id="customerId" placeholder="Enter Card Number" autocomplete="off" spellcheck="false">
                </div>
                <button class="search-btn" id="searchButton">
                     Check Card
                </button>
            </div>

            <div id="errorToast" class="error-message">
                <span>⚠️</span> <span id="errorText"></span>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer>
        <div class="footer-container">
            <div class="footer-content">
                <div class="copyright">
                    <p>&copy; 2022 CityClouds X Bevapors. All rights reserved. For adults 18+ only.</p>
                </div>
                <div class="social-links">
                    <a target="_blank" href="https://www.facebook.com/citycloudsxbevapors" rel="noopener noreferrer">
                        <i class="fab fa-facebook-f"></i>
                    </a>
                </div>
            </div>
        </div>
    </footer>

</div>

<script>
    (function () {
        const searchInput = document.getElementById('customerId');
        const searchBtn = document.getElementById('searchButton');
        const errorToast = document.getElementById('errorToast');
        const errorTextSpan = document.getElementById('errorText');

        let errorTimeout = null;

        function showError(message) {
            if (errorTimeout) clearTimeout(errorTimeout);
            errorTextSpan.innerText = message;
            errorToast.classList.add('show');
            errorTimeout = setTimeout(() => {
                errorToast.classList.remove('show');
                errorTimeout = null;
            }, 3600);
        }

        function clearErrorOnInput() {
            if (errorToast.classList.contains('show')) {
                errorToast.classList.remove('show');
                if (errorTimeout) { clearTimeout(errorTimeout); errorTimeout = null; }
            }
        }

        function performSearch() {
            let rawId = searchInput.value.trim();

            if (rawId === "") {
                showError("❌ Please enter a card number");
                searchInput.focus();
                return;
            }

            let sanitized = rawId
                .replace(/\.\./g, '')
                .replace(/[\\/]/g, '')
                .replace(/^\.+/, '')
                .replace(/\.+$/, '');

            if (sanitized === "") {
                showError("⚠️ Invalid ID. Use letters/numbers only.");
                return;
            }

            clearErrorOnInput();
            window.location.href = `customers/${sanitized}.html`;
        }

        searchBtn.addEventListener('click', () => performSearch());
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') { e.preventDefault(); performSearch(); }
        });
        searchInput.addEventListener('input', clearErrorOnInput);
        searchInput.focus();

        // Mobile menu
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const mainNav = document.getElementById('mainNav');

        if (mobileMenuBtn && mainNav) {
            mobileMenuBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                mainNav.classList.toggle('active');
                const icon = mobileMenuBtn.querySelector('i');
                icon.className = mainNav.classList.contains('active') ? 'fas fa-times' : 'fas fa-bars';
            });

            document.querySelectorAll('#mainNav a').forEach(link => {
                link.addEventListener('click', () => {
                    if (mainNav.classList.contains('active')) {
                        mainNav.classList.remove('active');
                        const icon = mobileMenuBtn.querySelector('i');
                        if (icon) icon.className = 'fas fa-bars';
                    }
                });
            });

            document.addEventListener('click', (e) => {
                if (!mainNav.contains(e.target) && !mobileMenuBtn.contains(e.target) && mainNav.classList.contains('active')) {
                    mainNav.classList.remove('active');
                    const icon = mobileMenuBtn.querySelector('i');
                    if (icon) icon.className = 'fas fa-bars';
                }
            });
        }
    })();
</script>
</body>
</html>

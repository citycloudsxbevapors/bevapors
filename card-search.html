<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Check My Points | CityClouds X Bevapors</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --primary: #8a2be2;
            --primary-dark: #6a0dad;
            --text-strong: #ffffff;
            --text-muted: #e9e9f3;
            --overlay-90: rgba(8, 10, 22, 0.90);
            --overlay-75: rgba(8, 10, 22, 0.75);
            --line: rgba(255, 255, 255, 0.12);
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        body {
            color: var(--text-strong);
            background-image: linear-gradient(180deg, rgba(6,8,18,0.55), rgba(6,8,18,0.55)), url("images/bg.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-color: #0d0f1e;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.35);
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            overflow: hidden;
        }

        .app-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            overflow: hidden;
        }

        /* ===== HEADER (matching index - no burger menu) ===== */
        header {
            background: var(--overlay-90);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--line);
            width: 100%;
            flex-shrink: 0;
            transition: background 0.2s ease;
        }

        .header-container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 12px 30px;
        }

        @media (max-width: 768px) {
            .header-container {
                padding: 10px 20px;
            }
        }

        @media (max-width: 480px) {
            .header-container {
                padding: 8px 16px;
            }
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .logo {
            font-size: 26px;
            font-weight: 700;
            color: var(--text-strong);
            text-decoration: none;
            display: flex;
            align-items: center;
            letter-spacing: 0.3px;
            flex-shrink: 0;
        }

        .logo span {
            color: var(--primary);
        }

        /* Navigation - always visible, no burger menu (matching index) */
        nav {
            display: block !important;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 8px;
        }

        nav ul li {
            margin-left: 0;
        }

        nav ul li a {
            color: var(--text-strong);
            text-decoration: none;
            font-weight: 600;
            position: relative;
            padding: 8px 16px;
            border-radius: 40px;
            transition: all 0.25s ease;
            display: inline-block;
        }

        nav ul li a:hover {
            color: #f8f6ff;
            background: rgba(255, 255, 255, 0.1);
        }

        nav ul li a::after {
            display: none;
        }

        /* Active page indicator */
        nav ul li a.active {
            background: linear-gradient(135deg, rgba(138, 43, 226, 0.3), rgba(106, 13, 173, 0.3));
            border: 1px solid rgba(138, 43, 226, 0.5);
        }

        /* Hide mobile menu button completely */
        .mobile-menu-btn {
            display: none !important;
        }

        /* ===== HERO ===== */
        .hero {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            min-height: 0;
            overflow-y: auto;
        }

        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(70% 60% at 50% 45%, transparent 0%, transparent 55%, rgba(6, 8, 18, 0.35) 100%);
            pointer-events: none;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        .cloud {
            position: absolute;
            opacity: 0.32;
            z-index: 1;
            color: #ffffff;
            filter: drop-shadow(0 6px 14px rgba(0, 0, 0, 0.25));
            animation: float 14s infinite ease-in-out;
            pointer-events: none;
        }

        .cloud:nth-child(1) { top: 12%; left: 4%; font-size: 100px; animation-delay: 0s; }
        .cloud:nth-child(2) { top: 24%; right: 6%; font-size: 130px; animation-delay: 1.5s; }
        .cloud:nth-child(3) { bottom: 18%; left: 8%; font-size: 110px; animation-delay: 3s; }
        .cloud:nth-child(4) { bottom: 12%; right: 5%; font-size: 95px; animation-delay: 5s; }

        /* ===== SEARCH CARD ===== */
        .search-container {
            position: relative;
            z-index: 2;
            max-width: 640px;
            width: 100%;
            background: rgba(8, 10, 22, 0.78);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 28px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            padding: 2.2rem 2.4rem 2.6rem;
            text-align: center;
            border: 1px solid var(--line);
            margin: 20px;
        }

        .search-container h1 {
            font-size: clamp(1.8rem, 3.5vw, 2.4rem);
            font-weight: 800;
            color: #fff;
            margin-bottom: 0.5rem;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.45);
        }

        .search-container h1 span {
            color: #d7c0ff;
            text-shadow: 0 1px 10px rgba(138, 43, 226, 0.45);
        }

        .sub {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-weight: 500;
            font-size: 0.95rem;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.2);
            display: inline-block;
            padding-bottom: 0.3rem;
        }

        .search-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
            justify-content: center;
            margin: 1.5rem 0 0.8rem;
        }

        .search-input-group {
            flex: 3;
            min-width: 200px;
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.25rem;
            color: var(--text-muted);
            pointer-events: none;
        }

        #customerId {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            font-size: 1.1rem;
            font-weight: 500;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 60px;
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            font-family: monospace;
            letter-spacing: 0.5px;
            outline: none;
            transition: 0.2s;
        }

        #customerId:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(138, 43, 226, 0.25);
        }

        #customerId::placeholder {
            font-family: 'Segoe UI', system-ui;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: normal;
        }

        .search-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 1rem 2rem;
            border-radius: 60px;
            color: white;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 10px 28px rgba(138, 43, 226, 0.35);
        }

        .search-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 34px rgba(138, 43, 226, 0.5);
        }

        .search-btn:active {
            transform: scale(0.96);
        }

        .error-message {
            margin-top: 1rem;
            background: rgba(185, 28, 28, 0.3);
            color: #fca5a5;
            padding: 0.7rem;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 500;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 1px solid rgba(252, 165, 165, 0.3);
        }

        .error-message.show {
            display: flex;
        }

        /* ===== FOOTER (matching index) ===== */
        footer {
            background: var(--overlay-75);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border-top: 1px solid var(--line);
            width: 100%;
            flex-shrink: 0;
        }

        .footer-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 14px 30px;
        }

        @media (max-width: 768px) {
            .footer-container {
                padding: 10px 20px;
            }
        }

        @media (max-width: 480px) {
            .footer-container {
                padding: 8px 16px;
            }
        }

        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .copyright {
            color: #ffffff;
            opacity: 0.92;
            font-size: 0.9rem;
        }

        .social-links {
            display: flex;
            gap: 12px;
        }

        .social-links a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            background: rgba(255, 255, 255, 0.14);
            border: 1px solid var(--line);
            color: #fff;
            text-decoration: none;
            border-radius: 50%;
            transition: transform 0.2s ease, background 0.2s ease;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.2);
        }

        .social-links a:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #d7c0ff, #9b79ff);
        }

        .social-links a:active {
            transform: scale(0.92);
            background: var(--primary);
        }

        /* ===== RESPONSIVE DESIGN - NO BURGER MENU (matching index) ===== */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: row;
                justify-content: space-between;
                flex-wrap: wrap;
            }
            
            .logo {
                font-size: 20px;
            }
            
            /* Navigation always visible, wraps on small screens */
            nav {
                width: auto;
                position: static;
                background: transparent;
                backdrop-filter: none;
                padding: 0;
                border: none;
                border-radius: 0;
                box-shadow: none;
                animation: none;
            }
            
            nav ul {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: flex-end;
                gap: 6px;
            }
            
            nav ul li {
                margin: 0;
                width: auto;
            }
            
            nav ul li a {
                padding: 6px 14px;
                font-size: 0.95rem;
                background: rgba(255, 255, 255, 0.06);
                border-radius: 40px;
                white-space: nowrap;
            }
            
            nav ul li a:active {
                background: rgba(138, 43, 226, 0.4);
                transform: scale(0.96);
            }
            
            .search-container {
                padding: 1.6rem 1.4rem;
                margin: 16px;
            }
            
            .search-wrapper {
                flex-direction: column;
            }
            
            .search-input-group {
                width: 100%;
            }
            
            .search-btn {
                width: 100%;
                justify-content: center;
            }
            
            .cloud {
                opacity: 0.18;
            }
        }

        @media (max-width: 480px) {
            .header-content {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }
            
            .logo {
                justify-content: center;
                font-size: 18px;
            }
            
            /* Navigation becomes centered */
            nav {
                width: 100%;
            }
            
            nav ul {
                justify-content: center;
                gap: 8px;
            }
            
            nav ul li a {
                padding: 5px 12px;
                font-size: 0.85rem;
                white-space: nowrap;
            }
            
            .footer-content {
                flex-direction: column;
                text-align: center;
                gap: 8px;
            }
            
            .copyright {
                font-size: 0.7rem;
            }
            
            .social-links a {
                width: 34px;
                height: 34px;
            }
            
            .cloud {
                display: none;
            }
            
            .search-container {
                padding: 1.4rem 1.2rem;
                border-radius: 20px;
                margin: 12px;
            }
            
            .search-container h1 {
                font-size: 1.5rem;
            }
            
            .sub {
                font-size: 0.85rem;
                margin-bottom: 1.2rem;
            }
            
            #customerId {
                padding: 0.85rem 1rem 0.85rem 2.8rem;
                font-size: 0.95rem;
            }
            
            .search-btn {
                padding: 0.85rem 1.5rem;
                font-size: 0.9rem;
            }
        }

        @media (max-height: 620px) {
            .search-container {
                padding: 1.2rem 1.8rem;
            }
            .cloud {
                opacity: 0.15;
            }
            .search-container h1 {
                margin-bottom: 0.2rem;
            }
            .sub {
                margin-bottom: 1rem;
            }
            .search-wrapper {
                margin: 1rem 0 0.5rem;
            }
        }

        /* Landscape mode */
        @media (max-width: 850px) and (orientation: landscape) {
            .search-container {
                padding: 1rem 1.5rem;
            }
            .search-wrapper {
                margin: 0.8rem 0 0.3rem;
            }
        }

        /* Safe area support */
        @supports (padding: max(0px)) {
            .header-container {
                padding-left: max(30px, env(safe-area-inset-left));
                padding-right: max(30px, env(safe-area-inset-right));
            }
            .footer-container {
                padding-left: max(30px, env(safe-area-inset-left));
                padding-right: max(30px, env(safe-area-inset-right));
                padding-bottom: max(14px, env(safe-area-inset-bottom));
            }
            @media (max-width: 768px) {
                .header-container {
                    padding-left: max(20px, env(safe-area-inset-left));
                    padding-right: max(20px, env(safe-area-inset-right));
                }
            }
            @media (max-width: 480px) {
                .header-container {
                    padding-left: max(16px, env(safe-area-inset-left));
                    padding-right: max(16px, env(safe-area-inset-right));
                }
            }
        }

        /* Prevent overscroll effects */
        body {
            overscroll-behavior: none;
            touch-action: pan-y pinch-zoom;
        }
        
        .hero {
            overscroll-behavior: contain;
        }
        
        /* Remove tap highlight */
        .search-btn, .social-links a, nav ul li a {
            -webkit-tap-highlight-color: rgba(138, 43, 226, 0.3);
        }
        
        .search-btn:focus-visible, .social-links a:focus-visible {
            outline: 2px solid #bc92ff;
            outline-offset: 2px;
        }
        
        #customerId {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>
<div class="app-wrapper">

    <!-- HEADER (no burger menu - matching index) -->
    <header>
        <div class="header-container">
            <div class="header-content">
                <a href="index.html" class="logo">
                    CityClouds <span>X</span> Bevapors
                </a>
                <nav>
                    <ul>
                        <li><a href="index.html">Home</a></li>
                        <li><a href="mechanics.html">Mechanics</a></li>
                        <li><a href="contact.html">Contact</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <!-- HERO / SEARCH -->
    <section class="hero">
        <div class="cloud"><i class="fas fa-cloud"></i></div>
        <div class="cloud"><i class="fas fa-cloud"></i></div>
        <div class="cloud"><i class="fas fa-cloud"></i></div>
        <div class="cloud"><i class="fas fa-cloud"></i></div>

        <div class="search-container">
            <h1>Check Your <span>Points</span></h1>
            <div class="sub">Enter your card number to check</div>

            <div class="search-wrapper">
                <div class="search-input-group">
                    <i class="fas fa-id-card search-icon"></i>
                    <input type="text" id="customerId" placeholder="Enter Card Number" autocomplete="off" spellcheck="false">
                </div>
                <button class="search-btn" id="searchButton">
                    <i class="fas fa-search"></i> Check Card
                </button>
            </div>

            <div id="errorToast" class="error-message">
                <span>⚠️</span> <span id="errorText"></span>
            </div>
        </div>
    </section>

    <!-- FOOTER (matching index) -->
    <footer>
        <div class="footer-container">
            <div class="footer-content">
                <div class="copyright">
                    <p>&copy; 2022 CityClouds X Bevapors. All rights reserved. For adults 18+ only.</p>
                </div>
                <div class="social-links">
                    <a target="_blank" href="https://www.facebook.com/citycloudsxbevapors" rel="noopener noreferrer">
                        <i class="fab fa-facebook-f"></i>
                    </a>
                </div>
            </div>
        </div>
    </footer>

</div>

<script>
    (function () {
        const searchInput = document.getElementById('customerId');
        const searchBtn = document.getElementById('searchButton');
        const errorToast = document.getElementById('errorToast');
        const errorTextSpan = document.getElementById('errorText');

        let errorTimeout = null;

        function showError(message) {
            if (errorTimeout) clearTimeout(errorTimeout);
            errorTextSpan.innerText = message;
            errorToast.classList.add('show');
            errorTimeout = setTimeout(() => {
                errorToast.classList.remove('show');
                errorTimeout = null;
            }, 3600);
        }

        function clearErrorOnInput() {
            if (errorToast.classList.contains('show')) {
                errorToast.classList.remove('show');
                if (errorTimeout) { clearTimeout(errorTimeout); errorTimeout = null; }
            }
        }

        function performSearch() {
            let rawId = searchInput.value.trim();

            if (rawId === "") {
                showError("❌ Please enter a card number");
                searchInput.focus();
                return;
            }

            let sanitized = rawId
                .replace(/\.\./g, '')
                .replace(/[\\/]/g, '')
                .replace(/^\.+/, '')
                .replace(/\.+$/, '');

            if (sanitized === "") {
                showError("⚠️ Invalid ID. Use letters/numbers only.");
                return;
            }

            clearErrorOnInput();
            window.location.href = `customers/${sanitized}.html`;
        }

        searchBtn.addEventListener('click', () => performSearch());
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') { e.preventDefault(); performSearch(); }
        });
        searchInput.addEventListener('input', clearErrorOnInput);
        
        // Small delay to focus without interrupting UX
        setTimeout(() => {
            searchInput.focus();
        }, 100);

        // Button hover/active micro-interactions
        if (searchBtn) {
            searchBtn.addEventListener('mouseenter', function() { 
                this.style.transform = 'translateY(-3px)'; 
            });
            searchBtn.addEventListener('mouseleave', function() { 
                this.style.transform = ''; 
            });
            searchBtn.addEventListener('touchstart', function() {
                this.style.transform = 'translateY(-2px)';
            });
            searchBtn.addEventListener('touchend', function() {
                this.style.transform = '';
            });
        }
    })();
</script>
</body>
</html>
